spring:
  application:
    name: gateway-service  # Debe coincidir con gateway-service.yml del repo de configs
  config:
    import: "optional:configserver:"  # Le dice a Spring que busque su config en el Config Server
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}  

# Config Server: dónde encontrar las configuraciones
# En Docker esto se sobreescribe con la variable de entorno CONFIG_SERVER_URI
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info