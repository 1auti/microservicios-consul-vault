services:

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s # Le da 30s para arrancar antes de empezar a chequear

  config-server:
    build:
      context: .
      dockerfile: config-service/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  gateway-server:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-server
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
    networks:
      - microservices-net
    depends_on:
      config-server:
        condition: service_healthy

networks:
  microservices-net:
    driver: bridge
